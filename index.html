<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevStore Pro | Portfolio E-commerce</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --bs-body-bg: #090d16;
            --bs-surface-bg: #111827;
            --accent-primary: #22c55e;
            --accent-hover: #16a34a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bs-body-bg);
            letter-spacing: -0.01em;
        }

        .navbar {
            background-color: rgba(17, 24, 39, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: -0.03em;
        }

        .brand-dot {
            color: var(--accent-primary);
        }

        .btn-filter {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: var(--bs-surface-bg);
            color: #9ca3af;
            font-weight: 500;
            padding: 0.5rem 1.25rem;
            border-radius: 30px;
            transition: all 0.2s ease;
        }

        .btn-filter:hover {
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
        }

        .btn-filter.active {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            color: #000000;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.4);
        }

        .product-card {
            background-color: var(--bs-surface-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .img-container {
            background-color: #ffffff;
            padding: 1.5rem;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .category-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            color: #e5e7eb;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.35rem 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            height: 2.8rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 0.5rem;
            color: #f3f4f6;
        }

        .product-price {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }

        .btn-add-cart {
            background-color: var(--accent-primary);
            color: #000000;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            padding: 0.6rem;
            width: 100%;
            transition: background-color 0.2s ease, transform 0.1s ease;
            margin-top: auto;
        }

        .btn-add-cart:hover {
            background-color: var(--accent-hover);
        }

        .offcanvas {
            background-color: var(--bs-surface-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            width: 420px !important;
        }

        .cart-item-row {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .cart-item-img-wrapper {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .cart-item-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .cart-item-details {
            flex-grow: 1;
            min-width: 0;
        }

        .cart-item-name {
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .cart-item-price {
            font-size: 0.85rem;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 0.2rem 0.4rem;
        }

        .btn-qty {
            padding: 0 0.4rem;
            font-size: 0.85rem;
            color: #ffffff;
            background: transparent;
            border: none;
        }

        .shimmer-card {
            background: var(--bs-surface-bg);
            border-radius: 16px;
            height: 380px;
            overflow: hidden;
            position: relative;
        }

        .shimmer-anim {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.03) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.5s infinite;
        }

        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand navbar-dark sticky-top">
        <div class="container py-1">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-cpu-fill text-success me-2"></i>
                DevStore<span class="brand-dot">_</span>
            </a>
            <div class="ms-auto">
                <button class="btn btn-outline-light position-relative rounded-pill px-3 d-flex align-items-center gap-2" 
                        type="button" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
                    <i class="bi bi-bag-heart-fill text-success"></i>
                    <span class="d-none d-sm-inline font-weight-500">Carrinho</span>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success text-dark" id="cart-badge">0</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row mb-5 justify-content-center text-center">
            <div class="col-lg-8">
                <span class="badge bg-dark border border-secondary text-secondary mb-2 rounded-pill px-3 py-2">Desafio Prático Front-end</span>
                <h1 class="fw-bold tracking-tight mb-3">Catálogo Dinâmico & Consumo de API</h1>
                <p class="text-secondary lead fs-6">
                    Aplicação conectada à <code class="text-success">FakeStoreAPI</code> com renderização assíncrona, filtros avançados de arrays e persistência de dados.
                </p>
            </div>
        </div>

        <div class="d-flex flex-wrap gap-2 justify-content-center mb-5" id="filters-container">
            <button class="btn btn-filter active" data-category="todos">Todos os Produtos</button>
            <button class="btn btn-filter" data-category="electronics">Eletrônicos</button>
            <button class="btn btn-filter" data-category="jewelery">Acessórios & Joias</button>
            <button class="btn btn-filter" data-category="clothing">Vestuário</button>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="loading-grid">
            <div class="col"><div class="shimmer-card"><div class="shimmer-anim"></div></div></div>
            <div class="col"><div class="shimmer-card"><div class="shimmer-anim"></div></div></div>
            <div class="col"><div class="shimmer-card"><div class="shimmer-anim"></div></div></div>
            <div class="col"><div class="shimmer-card"><div class="shimmer-anim"></div></div></div>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4 d-none" id="products-grid"></div>
    </main>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
        <div class="offcanvas-header border-bottom border-secondary-subtle py-4">
            <h5 class="offcanvas-title fw-bold d-flex align-items-center gap-2">
                <i class="bi bi-cart3 text-success"></i> Sacola de Compras
            </h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body" id="cart-items-container"></div>
        <div class="offcanvas-footer p-4 border-top border-secondary-subtle bg-dark-subtle">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span class="text-secondary fw-medium">Subtotal Estimado:</span>
                <span class="fs-4 fw-bold text-success" id="cart-total-price">R$ 0,00</span>
            </div>
            <button class="btn btn-success w-100 py-3 fw-bold text-dark rounded-3" id="checkout-btn">
                <i class="bi bi-credit-card-2-back me-2"></i>Ir para o Pagamento
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let apiProducts = [];
        let cart = JSON.parse(localStorage.getItem('devstore_premium_cart')) || [];
        let activeFilter = 'todos';
        const CONVERSION_RATE = 5.50;

        const DOM = {
            productsGrid: document.getElementById('products-grid'),
            loadingGrid: document.getElementById('loading-grid'),
            cartItemsContainer: document.getElementById('cart-items-container'),
            cartBadge: document.getElementById('cart-badge'),
            cartTotalPrice: document.getElementById('cart-total-price'),
            filterButtons: document.querySelectorAll('.btn-filter'),
            checkoutBtn: document.getElementById('checkout-btn')
        };

        const formatBRL = (value) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        };

        async function fetchProductsFromAPI() {
            try {
                const response = await fetch('https://fakestoreapi.com/products');
                if (!response.ok) throw new Error('Erro na API');
                const data = await response.json();
                
                apiProducts = data.map(product => ({
                    id: product.id,
                    title: product.title,
                    price: product.price * CONVERSION_RATE,
                    image: product.image,
                    normalizedCategory: normalizeCategory(product.category)
                }));

                DOM.loadingGrid.classList.add('d-none');
                DOM.productsGrid.classList.remove('d-none');
                renderProducts();
            } catch (error) {
                console.error(error);
            }
        }

        function normalizeCategory(category) {
            if (category === 'electronics') return 'electronics';
            if (category === 'jewelery') return 'jewelery';
            if (category.includes('clothing')) return 'clothing';
            return 'other';
        }

        function renderProducts() {
            DOM.productsGrid.innerHTML = '';
            const filtered = activeFilter === 'todos' ? apiProducts : apiProducts.filter(p => p.normalizedCategory === activeFilter);

            filtered.forEach(product => {
                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="product-card">
                        <div class="img-container">
                            <img src="${product.image}" alt="${product.title}" class="product-img" loading="lazy">
                        </div>
                        <div class="card-body">
                            <h3 class="product-title" title="${product.title}">${product.title}</h3>
                            <div class="product-price">${formatBRL(product.price)}</div>
                            <button class="btn-add-cart" onclick="addProductToCart(${product.id})">
                                <i class="bi bi-cart-plus me-2"></i>Adicionar
                            </button>
                        </div>
                    </div>
                `;
                DOM.productsGrid.appendChild(col);
            });
        }

        DOM.filterButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                DOM.filterButtons.forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                activeFilter = e.target.dataset.category;
                renderProducts();
            });
        });

        function syncCartStorage() {
            localStorage.setItem('devstore_premium_cart', JSON.stringify(cart));
            renderCartUI();
        }

        function addProductToCart(productId) {
            const product = apiProducts.find(p => p.id === productId);
            const targetItem = cart.find(item => item.id === productId);

            if (targetItem) {
                targetItem.quantity += 1;
            } else {
                cart.push({ id: product.id, title: product.title, price: product.price, image: product.image, quantity: 1 });
            }
            syncCartStorage();
            bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('cartSidebar')).show();
        }

        function changeCartQty(productId, method) {
            const item = cart.find(i => i.id === productId);
            if (!item) return;
            if (method === 'add') item.quantity += 1;
            if (method === 'sub') {
                item.quantity -= 1;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== productId);
                }
            }
            syncCartStorage();
        }

        function removeProductFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            syncCartStorage();
        }

        function renderCartUI() {
            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            DOM.cartBadge.textContent = totalItems;

            const totalValue = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            DOM.cartTotalPrice.textContent = formatBRL(totalValue);

            DOM.cartItemsContainer.innerHTML = '';
            if (cart.length === 0) {
                DOM.cartItemsContainer.innerHTML = '<p class="text-center text-secondary py-5">Sua sacola está vazia.</p>';
                return;
            }

            cart.forEach(item => {
                const row = document.createElement('div');
                row.className = 'cart-item-row';
                row.innerHTML = `
                    <div class="cart-item-img-wrapper"><img src="${item.image}" class="cart-item-img"></div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.title}</div>
                        <div class="cart-item-price">${formatBRL(item.price)}</div>
                    </div>
                    <div class="d-flex flex-column align-items-end gap-1">
                        <div class="quantity-control">
                            <button class="btn-qty" onclick="changeCartQty(${item.id}, 'sub')">-</button>
                            <span class="small fw-bold">${item.quantity}</span>
                            <button class="btn-qty" onclick="changeCartQty(${item.id}, 'add')">+</button>
                        </div>
                    </div>
                `;
                DOM.cartItemsContainer.appendChild(row);
            });
        }

        DOM.checkoutBtn.addEventListener('click', () => {
            if (cart.length === 0) {
                alert('Sua sacola de compras está vazia.');
                return;
            }
            const totalValue = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
            localStorage.setItem('devstore_checkout_total', totalValue);
            window.location.href = 'pagamento.html';
        });

        fetchProductsFromAPI();
        renderCartUI();
    </script>
</body>
</html>
